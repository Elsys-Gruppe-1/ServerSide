<!--Sier at vi skal arve fra base.html:-->
{% extends "base.html" %}

<!--Lager blokk for tittelen-->
{% block title %}Sensor{% endblock %}

<!--Blokk for content-->
{% block content %}
<h1>Sensor</h1>

<!--Temperatur-->
<h2>Temperatur</h2>

<div style="display: flex; gap: 20px; margin-bottom: 50px;">

    <!---Graf for siste døgn-->
    <div style="width: 400px; height: 250px;">
        <h3>Siste døgn</h3>
        <canvas id="temperaturDagChart" width="300" height="200"></canvas>
    </div>

    <!---Graf for siste uke-->
    <div>
        <h3>Siste 7 dager</h3>
        <canvas id="temperaturUkeChart" width="300" height="200"></canvas>
    </div>
</div>

<h2>Strømning</h2>
<!--Strømning-->
<canvas id="strømningChart" width="300" height="100"></canvas>

<!--TDS-->
<canvas id="tdsChart"></canvas>

<!--Dybde-->
<canvas id="dybdeChart"></canvas>

<!--Turbiditet-->
<canvas id="turbiditetChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='sensor.js') }}"></script>
{% endblock %}
