<!--Sier at vi skal arve fra base.html:-->
{% extends "base.html" %}

<!--Lager blokk for tittelen-->
{% block title %}Sensor{% endblock %}

<!--Blokk for content-->
{% block content %}

<div class="sensor-container">

    <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 30px;">
        <h1>Sensordata</h1>

        <a href="{{ url_for('data.download_data') }}" class="download-button">
            Last ned sensordata (CSV)
        </a>
    </div>

    <!--Temperatur-->

    <section style="margin-bottom: 60px;">
        <h2>Temperatur</h2>


        <div class="charts-div">
            <!---Graf for siste døgn-->
            <div class="chart-card">
                <h3>Siste døgn</h3>
                <div class="chart-box">
                    <canvas id="temperaturDagChart"></canvas>
                </div>
            </div>

            <!---Graf for siste uke-->
            <div class="chart-card">
                <h3>Siste 7 dager</h3>
                <div class="chart-box">
                    <canvas id="temperaturUkeChart"></canvas>
                </div>
            </div>
        </div>
    </section>


    <!--TDS-->
    <section style="margin-bottom: 60px;">
        <h2>TDS</h2>

        <div class="charts-div">
            <!---Graf for siste døgn-->
            <div class="chart-card">
                <h3>Siste døgn</h3>
                <div class="chart-box">
                    <canvas id="tdsDagChart"></canvas>
                </div>
            </div>

            <!---Graf for siste uke-->
            <div class="chart-card">
                <h3>Siste 7 dager</h3>
                <div class="chart-box">
                    <canvas id="tdsUkeChart"></canvas>
                </div>
            </div>
        </div>
    </section>

    <section detection-container>
        <div style="display: flex; align-items: center; gap: 30px; margin-bottom: 30px;">
         <h1>Deteksjoner</h1>

            <a href="{{ url_for('data.download_detections') }}" class="download-button">
                Last ned deteksjoner (CSV)
            </a>
        </div>
        <div id="detections-table"></div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='sensor.js') }}"></script>
<script src="{{ url_for('static', filename='data.js') }}"></script>
{% endblock %}
