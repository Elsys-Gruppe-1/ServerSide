<!DOCTYPE html>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<html>
    <head>
        <!--Link for "Include via CDN" CSS-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
          <title>Stimle</title>
          <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
        <style>
            .navbar-custom {
                background-color: #5f9ea0;

            }
            .navbar-custom .nav-link {
                color: white;
                -webkit-text-stroke: 0.5px #FF00A6;
                font-weight: bold;
                font-size: 1.25rem
            }
            .navbar-custom .nav-link:hover {
                color: pink;
            }

            body {
                background-color: #c3e6e3;
            }

            .btn {
                color: white;
                -webkit-text-stroke: 0.5px #FF00A6;
                font-weight: bold;
                font-size: 1rem
            }

            .btn-outline-success {
                color: pink;
                border-color: pink;
            }

            .btn-outline-success:hover {
                background-color: rgb(195, 230, 227);
                color: white;
                border-color: rgb(195, 230, 227);
            }

            .nav-tabs .nav-link.active {
                background-color: cadetblue;
                border-color: cadetblue;
            }

        </style>

    </head>
    <body>

        <!--Her er kode tatt fra bootstrap som gir navigation bar-->
        <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
           <!--<a class="navbar-brand" href="#">STIMLE</a> --> 

            <a class="navbar-brand d-flex align-items-center" href="#">
                
                <img src="{{ url_for('static', filename='images/banner3.png') }}" 
                    alt="Logo" 
                    width="163.75" 
                    height="45.625"
                    class="me-2">

            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="{{ url_for('home.home') }}">Home</a>
                    </li>
                    

                    
                    <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('sensor.sensor') }}">Sensor profil</a>
                    </li>
                    



                    <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('analyse.analyse') }}">Manuell analyse</a>
                    </li>

                    <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('ukas_fisk.ukas_fisk') }}">Ukas fisk</a>
                    </li>
                    <!--
                    <li class="nav-item">
                    <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>-->
                </ul>
            </ul>
            
            <!--
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            </div>
            -->

        </div>
        </nav>
        <!--Slutt på nav bar-->

        {% block content %}
        {% endblock %}
        <!--Link for "Include via CDN" JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
