<!DOCTYPE html>

<html>
    <head>
        <!--Link for "Include via CDN" CSS-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <title>
            Stimlestimle
            {% block title %} {% endblock %}
        </title>

        <style>
            .navbar-custom {
                background-color: cadetblue;
            }
            .navbar-custom .nav-link {
                color: rgb(181, 0, 94);
            }
            .navbar-custom .nav-link:hover {
                color: pink;
            }

            body {
            background-color: rgb(195, 230, 227);
        }
        </style>

    </head>
    <body>

        <!--Her er kode tatt fra bootstrap som gir navigation bar-->
        <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">STIMLE</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="{{ url_for('home.home') }}">Home</a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown" aria-expanded="false">
                    Fiskepassering
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="{{ url_for('siste_passert.siste_passert') }}">Siste passert fisk</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="{{ url_for('oversikt_passering.oversikt_passering') }}">Ukas fisk</a></li>
                    </ul>
                
                </li>
                
                <li class="nav-item">
                <a class="nav-link" href="{{ url_for('sensor.sensor') }}">Sensor profil</a>
                </li>
                

                <li class="nav-item">
                <a class="nav-link" href="#">Fisk info</a>
                </li>

                <li class="nav-item">
                <a class="nav-link" href="{{ url_for('analyse.analyse') }}">Manuell analyse</a>
                </li>
                <!--
                <li class="nav-item">
                <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                </li>-->
            </ul>
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            </div>
        </div>
        </nav>
        <!--Slutt på nav bar-->

        {% block content %}
        {% endblock %}
        <!--Link for "Include via CDN" JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
